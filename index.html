<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нова заявка</title>

<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
    

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: #fff;
}

/* HEADER */
.header {
    padding: 15px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: bold;
}

.logo {
    height: 24px;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    padding: 20px 10px;
}

/* FORM */
form {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
}

/* LABELS */
label {
    margin: 15px 0 5px;
    color: #ccc;
    align-self: flex-start;
}

.required::after {
    content: "*";
    color: #d4af37;
    margin-left: 4px;
}

/* INPUTS */
input, select, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: #fff;
    font-size: 16px;
}

/* TEXTAREA */
textarea {
    min-height: 100px;
    resize: vertical;
}

/* HIDDEN & DYNAMIC BLOCKS */
.hidden {
    display: none !important;
}

/* Вирівнювання внутрішніх елементів прихованих блоків */
#dynamicBlock, #contactBlock {
    display: flex;
    flex-direction: column;
}

/* UNIFIED BUTTON STYLE */
.btn {
    width: 100%;
    padding: 14px;
    margin-top: 20px; /* Трохи збільшив відступ зверху для кнопки */
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    text-align: center;
    display: block;
    text-decoration: none;
    cursor: pointer;
}

/* SUBMIT */
button.btn {
    border: none;
    background: #d4af37;
    color: #000;
}

/* LINK BUTTON */
a.btn {
    background: #d4af37;
    color: #000;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
    <img src="https://i.ibb.co/R1Z4HdW/1776440599195-2.jpg" class="logo">
    Нова заявка
</div>

<div class="container">

<form id="form">

<label class="required">Підрозділ</label>
<input id="unit" required>

<label>Позиція</label>
<input id="position">

<label class="required">Координати</label>
<input id="coords" required>

<label class="required">Що веземо</label>
<select id="cargo" required>
    <option value="" disabled selected hidden>Оберіть варіант</option>
    <option>Доставка Паливо, Їжа, Вода</option>
    <option>БК</option>
    <option>Евак 300</option>
    <option>Евак 200</option>
    <option>Евак НРК</option>
    <option>ЕВАК БПЛА</option>
    <option>Доставка БПЛА</option>
    <option>Колоди</option>
    <option>Вивезти з позиції</option>
    <option>Обладнання</option>
    <option>Інше</option>
</select>

<div id="dynamicBlock" class="hidden">
    <label id="dynamicLabel"></label>
    <input type="number" id="dynamicValue">
</div>

<div id="contactBlock" class="hidden">
    <label>Позивний бійця на позиції</label>
    <input id="callsign">

    <label>Телефон на позиції</label>
    <input id="phone">
</div>

<label>Коментар</label>
<textarea id="comment"></textarea>

<button type="submit" class="btn">Надіслати заявку</button>

<a class="btn" href="https://AlterEgo93.github.io/checkid">Перевірити статус</a>

</form>
</div>

<script>
const cargo = document.getElementById("cargo");
const dynamicBlock = document.getElementById("dynamicBlock");
const dynamicLabel = document.getElementById("dynamicLabel");
const dynamicValue = document.getElementById("dynamicValue");

const position = document.getElementById("position");
const contactBlock = document.getElementById("contactBlock");

const unit = document.getElementById("unit");
const coords = document.getElementById("coords");
const callsign = document.getElementById("callsign");
const phone = document.getElementById("phone");
const comment = document.getElementById("comment");

/* ENTER & AUTO navigation */
function focusNext(el) {
    // Шукаємо всі поля, які не мають класу hidden та не знаходяться всередині hidden батька
    const inputs = Array.from(document.querySelectorAll("input, select, textarea"))
        .filter(e => e.offsetParent !== null);

    const index = inputs.indexOf(el);
    if (inputs[index + 1]) {
        inputs[index + 1].focus();
    }
}

/* cargo logic */
cargo.addEventListener("change", () => {
    const val = cargo.value;

    if (val === "Евак 300" || val === "Евак 200") {
        dynamicBlock.classList.remove("hidden");
        dynamicLabel.innerText = "Кількість в/с";
    } else if (val === "Евак НРК" || val === "ЕВАК БПЛА" || val === "") {
        dynamicBlock.classList.add("hidden");
    } else {
        dynamicBlock.classList.remove("hidden");
        dynamicLabel.innerText = "Вага (кг)";
    }
    
    // Автоматичний перехід на наступне поле після вибору
    focusNext(cargo);
});

/* contact show */
position.addEventListener("input", () => {
    contactBlock.classList.toggle("hidden", position.value.trim() === "");
});

/* ID */
function generateID() {
    return Math.random().toString(36).substring(2, 10);
}

document.querySelectorAll("input, textarea, select").forEach(el => {
    el.addEventListener("keydown", e => {
        if (e.key === "Enter") {
            e.preventDefault();
            focusNext(el);
        }
    });
});

window.onload = () => unit.focus();

/* submit logic */
document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    const id = generateID();
    const shortID = id.slice(-3);

    let text = "";

    const add = (label, value) => {
        if (value) text += `${label}: ${value}\n`;
    };

    add("Підрозділ", unit.value);
    add("Позиція", position.value);
    add("Координати", coords.value);
    add("Що веземо", cargo.value);

    if (!dynamicBlock.classList.contains("hidden") && dynamicValue.value) {
        add("Вага/Кількість", dynamicValue.value);
    }

    if (!contactBlock.classList.contains("hidden")) {
        if (callsign.value || phone.value) {
            add("Контакт", `${callsign.value}; ${phone.value}`);
        }
    }

    add("Коментар", comment.value);

    const now = new Date().toLocaleTimeString("uk-UA");
    text += `ID: ${shortID}\n${now}`;

    const url = `https://wa.me/380994750678?text=${encodeURIComponent(text)}`;
    const scriptURL = "https://script.google.com/macros/s/AKfycbyN8r_nDF-b9U8ljwFiWkYcZlxwwY2kH7ojPtlzV5YQnza_zkybzOvNIbHYCvxVFs7iHQ/exec";
    const formattedDate = new Date().toLocaleDateString("uk-UA");

    

    document.getElementById("form").reset();
    window.location.href = url;
});
</script>

</body>
</html>
